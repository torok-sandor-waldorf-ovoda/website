local_backend: true

backend:
  name: github
  repo: torok-sandor-waldorf-ovoda/website
  branch: main

media_folder: src/images/uploads
public_folder: /images/uploads

locale: hu

slug:
  encoding: ascii
  clean_accents: true

collections:
  - name: blog
    label: Hírek
    label_singular: Bejegyzés
    folder: src/blog/posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Cím, name: title, widget: string }
      - { label: Leírás, name: description, widget: string, required: false }
      - { label: Dátum, name: date, widget: datetime }
      - { label: Layout, name: layout, widget: hidden, default: post.webc }
      - { label: Tartalom, name: body, widget: markdown }
    editor:
      preview: false

  - name: documents
    label: Dokumentumok
    files:
      - name: documents
        label: Dokumentumlista
        file: src/_data/documents.json
        fields:
          - label: Dokumentumok
            name: items
            widget: list
            fields:
              - { label: Fájl útvonal, name: href, widget: string, hint: "Pl. /dokumentumok/fajl.pdf" }
              - { label: Megnevezés, name: label, widget: string }

  - name: navigation
    label: Navigáció
    files:
      - name: nav
        label: Főmenü
        file: src/_data/nav.json
        fields:
          - label: Menüpontok
            name: items
            widget: list
            fields:
              - { label: Felirat, name: label, widget: string }
              - { label: URL, name: url, widget: string }
