local_backend: true

# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: torok-sandor-waldorf-ovoda/website
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/b9ab930f-8756-457a-9a20-24335b55713e/pkce
  auth_token_endpoint: /sites/b9ab930f-8756-457a-9a20-24335b55713e/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://tswo.hu

# Media folder
media_folder: src/images/uploads
public_folder: /images/uploads

# Locale
locale: hu

# Slug
slug:
  encoding: ascii
  clean_accents: true

editor:
  preview: false

collections:
  - name: site
    label: Oldal tartalom
    files:
      - name: homepage
        label: Főoldal
        file: src/_data/homepage.json
        fields:
          - label: Köszöntő
            name: intro
            widget: object
            fields:
              - { label: Cím, name: title, widget: string }
              - { label: Rövid szöveg, name: teaser, widget: markdown }
              - { label: További szöveg, name: more, widget: markdown }
              - { label: „Tovább olvasok” felirat, name: toggleLabel, widget: string, required: false, default: "Tovább olvasok" }
          - label: Pedagógiai hitvallás
            name: quote
            widget: object
            fields:
              - { label: Idézet szövege, name: text, widget: markdown }
          - label: Kártyák
            name: cards
            widget: list
            min: 2
            max: 2
            fields:
              - { label: Cím, name: title, widget: string }
              - { label: Tartalom, name: body, widget: markdown }
          - label: Óvodai jelentkezés
            name: application
            widget: object
            fields:
              - { label: Cím, name: title, widget: string }
              - { label: Tartalom, name: body, widget: markdown }
          - label: Elérhetőségek
            name: contact
            widget: object
            fields:
              - { label: Cím, name: title, widget: string }
              - { label: Tartalom, name: body, widget: markdown }

      - name: documents
        label: Dokumentumok
        file: src/_data/documents.json
        fields:
          - label: Dokumentumok
            name: items
            widget: list
            fields:
              - { label: Fájl útvonal, name: href, widget: string, hint: "Pl. /dokumentumok/fajl.pdf" }
              - { label: Megnevezés, name: label, widget: string }

  - name: gallery
    label: Galéria
    files:
      - name: gallery
        label: Képek
        file: src/_data/gallery.json
        fields:
          - label: Képek
            name: items
            widget: list
            label_singular: kép
            collapsed: true
            summary: "{{fields.image}}"
            field:
              label: Kép
              name: image
              widget: image

  - name: blog
    label: Hírek
    label_singular: Bejegyzés
    folder: src/blog/posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Cím, name: title, widget: string }
      - { label: Leírás, name: description, widget: string, required: false }
      - { label: Dátum, name: date, widget: datetime }
      - { label: Layout, name: layout, widget: hidden, default: post.webc }
      - { label: Tartalom, name: body, widget: markdown }