<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tartalomkezelés</title>
    <style>
      .gallery-list-row {
        box-sizing: border-box;
      }

      .gallery-list-item {
        display: flex !important;
        align-items: center;
        gap: 0.75rem;
        width: 100% !important;
        flex: 1 1 auto;
        box-sizing: border-box;
      }

      .gallery-list-thumb {
        width: 6rem;
        height: 6rem;
        object-fit: cover;
        border-radius: 0.375rem;
        flex-shrink: 0;
        background: #eee;
      }

      .gallery-list-label {
        font-size: 0.875rem;
        color: #444;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script src="/admin/gallery-list.js"></script>
  </body>
</html>
